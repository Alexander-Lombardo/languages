  <title>English A1 → C2 · Curso interactivo</title>
  <script>
    /* apply persisted theme before first paint to avoid a light-mode flash */
    (function () {
      try {
        var t = localStorage.getItem("siteTheme.v1");
        if (!t && window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches) t = "dark";
        if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="styles.css?v=6" />
</head>
